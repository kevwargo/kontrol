# Example
#
# <command-id>:
#   key: string
#   # exactly one of the following can be specified
#   shell: string
#   cmd: string[]
#   prompt: string
#   snippet:
#     text: string
#     cmd: string
#     notify:
#       details: boolean
#       timeout: number

bt-on:
  key: Meta+Shift+B
  shell: rfkill unblock bluetooth
bt-off:
  key: Meta+Alt+B
  shell: rfkill block bluetooth
kscreen-toggle-laptop:
  key: Meta+Alt+X
  shell: kscreen-toggle-laptop
mocp-g:
  key: Meta+Q
  shell: mocp -G
open-foot:
  key: Meta+Shift+T
  shell: foot -w 1200x800
email:
  key: Meta+Alt+2
  snippet:
    text: jarasz.kevwargo@gmail.com
    notify:
      details: true
mfa-github:
  key: Meta+Shift+G
  snippet:
    cmd: mfacli --password-command ksshaskpass print github
    notify:
      details: true
      timeout: 1000
dtt:
  key: Meta+Alt+D
  snippet:
    cmd: date +%Y%m%d-%H%M%S
    notify:
      details: true
