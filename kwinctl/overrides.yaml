kwin:
  name: KWin
  actions:
    Window Above Other Windows:
      name: Keep Window Above Others
      keys:
        - Meta++
kmix:
  name: Audio Volume
  actions:
    decrease_volume:
      name: Decrease Volume
      keys:
        - Meta+F2
    increase_volume:
      name: Increase Volume
      keys:
        - Meta+F3
