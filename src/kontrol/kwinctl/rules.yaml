# Example
#
# <rule-id>:
#   key: string
#   cls: string?
#   caption: string?
#   command: string?
#   auto: boolean?

konsole:
  key: Meta+C
  command: konsole
  cls: org.kde.konsole
  auto: true
browser:
  key: Meta+F
  command: brave
  cls: brave-browser
systemsettings:
  key: Meta+S
  cls: systemsettings
  command: systemsettings
  auto: true
emacs:
  key: Meta+E
  cls: Emacs
  command: emacs
telegram:
  key: Meta+T
  cls: org.telegram.desktop
  command: Telegram
krusader:
  key: Meta+Shift+D
  cls: org.kde.krusader
  command: krusader
okular:
  key: Meta+O
  cls: org.kde.okular
vlc:
  key: Meta+V
  cls: vlc
kdenlive:
  key: Meta+K
  cls: org.kde.kdenlive
  command: kdenlive
amarok:
  key: Meta+Shift+Q
  cls: org.kde.amarok
  command: amarok
  auto: true
htop:
  key: Meta+Shift+C
  cls: foot
  caption: HTOP
  command: foot --maximized --title HTOP htop
  auto: true
okteta:
  key: Meta+Shift+O
  cls: org.kde.okteta
qkvox:
  key: Meta+Shift+A
  cls: qkvox
  command: qkvox
  auto: true
kbrite:
  key: Meta+Shift+R
  cls: kbrite
  command: kbrite
  auto: true
